<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="256" cy="256" r="150" stroke="#60a5fa" stroke-width="12" fill="none"/>
  <!-- Longitude lines -->
  <ellipse cx="256" cy="256" rx="67" ry="150" stroke="#60a5fa" stroke-width="8" fill="none"/>
  <!-- Latitude line -->
  <line x1="106" y1="256" x2="406" y2="256" stroke="#60a5fa" stroke-width="8"/>
  <!-- Threat indicator dot -->
  <circle cx="370" cy="140" r="60" fill="#ef4444"/>
  <circle cx="370" cy="140" r="30" fill="#fca5a5"/>
</svg>
